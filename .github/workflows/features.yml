name: Features

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read
      deployments: write
      id-token: write
    uses: ably/features/.github/workflows/sdk-features.yml@main
    with:
      repository-name: ably-cocoa
    secrets:
      ABLY_AWS_ACCOUNT_ID_SDK: ${{ secrets.ABLY_AWS_ACCOUNT_ID_SDK }}
